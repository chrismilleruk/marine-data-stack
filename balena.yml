name: marine-data-stack
type: sw.application
version: 0.2.0
description: >-
  Slim marine data collection stack for Raspberry Pi 4.
  Collects NMEA data via SignalK, syncs logs to shore via Syncthing,
  system stats to TimescaleDB via Telegraf.
  No local database, no screen — tablet for navigation.
assets:
  repository:
    type: blob.asset
    data:
      url: 'https://github.com/chrismilleruk/marine-data-stack'
data:
  applicationEnvironmentVariables:
    - ADMINUSER: admin:Strong_p@ssword
  defaultDeviceType: raspberrypi4-64
  supportedDeviceTypes:
    - raspberrypi4-64
    - raspberrypi5
