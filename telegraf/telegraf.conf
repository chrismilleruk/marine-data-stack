# Telegraf — System stats collector for marine-data-stack
# Collects system metrics and sends to TimescaleDB
# Nav data is handled separately via Syncthing + nmea_relay.py

[agent]
  interval = "60s"
  flush_interval = "30s"
  hostname = "${BALENA_DEVICE_NAME_AT_INIT}"
  metric_batch_size = 100
  flush_jitter = "10s"
  metric_buffer_limit = 10000

# Output: TimescaleDB
[[outputs.postgresql]]
  connection = "${TIMESCALE_CONNECTION_STRING}"
  timestamp_column_name = "time"
  timestamp_column_type = "timestamp with time zone"
  tags_as_foreign_keys = false
  tag_columns = ["host"]
  create_templates = [
    '''CREATE TABLE IF NOT EXISTS {{ .table }} ({{ .columns }})''',
    '''SELECT create_hypertable({{ .table|quoteLiteral }}, 'time', chunk_time_interval => INTERVAL '7d', if_not_exists => true)''',
  ]

# System metrics
[[inputs.cpu]]
  percpu = false
  totalcpu = true
  collect_cpu_time = false

[[inputs.mem]]

[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]

[[inputs.system]]

[[inputs.temp]]
