# Marine Data Stack 2026 — Raspberry Pi 4
# Slim stack: no screen, no local DB, no local dashboards
#
# Services:
# - SignalK: Marine data server (NMEA via MacArthur Hat)
# - AVNav: Navigation software (accessible from tablet)
# - Syncthing: Syncs NMEA logs + config to shore
# - Telegraf: System stats → TimescaleDB
# - Cloudflared: Remote access tunnel
#
# Data flow: NMEA devices → SignalK → NMEA logs → Syncthing → shore
#            Shore side: nmea_relay.py watches synced logs → TimescaleDB
#
# Power target: ~300mA at 12V (HDMI off, underclocked)

version: '2'

services:
  signalk:
    build:
      context: ./signalk
    container_name: signalk
    privileged: true
    ports:
      - "3000:3000"      # Web interface
      - "8375"           # NMEA 0183 TCP input
      - "10110:10110"    # NMEA 0183 TCP output
      - "8443:8443"      # HTTPS
    volumes:
      - signalk-config:/home/node/.signalk
      - signalk-logs:/home/node/.signalk/logs
    environment:
      - NMEA0183PORT=10110
    restart: unless-stopped
    labels:
      io.balena.features.supervisor-api: '1'

  avnav:
    build:
      context: ./avnav
    container_name: avnav
    ports:
      - "8080:8080"      # AVNav web interface
      - "8081"           # NMEA over TCP (input)
      - "8082"           # NMEA over TCP (output)
    volumes:
      - avnav-home:/home/avnav/avnav
      - avnav-charts:/home/avnav/charts
    environment:
      - TZ=UTC
    restart: unless-stopped
    privileged: true
    depends_on:
      - signalk
    labels:
      io.balena.features.supervisor-api: '1'

  syncthing:
    image: lscr.io/linuxserver/syncthing:latest
    container_name: syncthing
    hostname: marine-syncthing
    environment:
      - TZ=UTC
      - PUID=1000
      - PGID=1000
    volumes:
      - syncthing-config:/config
      - signalk-config:/sync/signalk-config
      - signalk-logs:/sync/signalk-logs
    ports:
      - "8384:8384"      # Web UI
      - "22000:22000/tcp"
      - "22000:22000/udp"
      - "21027:21027/udp"
    restart: unless-stopped
    labels:
      io.balena.features.supervisor-api: '1'

  telegraf:
    build:
      context: ./telegraf
      dockerfile: Dockerfile
    container_name: telegraf
    privileged: true  # needed for system stats (CPU temp, disk)
    restart: unless-stopped
    labels:
      io.balena.features.supervisor-api: '1'

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    restart: unless-stopped
    labels:
      io.balena.features.supervisor-api: '1'

volumes:
  signalk-config:
  signalk-logs:
  avnav-home:
  avnav-charts:
  syncthing-config:
